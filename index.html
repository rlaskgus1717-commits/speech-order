<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>연설 순서 뽑기</title>
  <style>
    :root { --radius: 12px; --gap: 7px; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: radial-gradient(ellipse at 50% 35%, #1c2f5e 0%, #0d1b36 55%, #060e20 100%);
      height: 100dvh;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 로딩 오버레이 ─────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: rgba(6,14,32,0.96);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      flex-direction: column; gap: 14px;
    }
    #loading-overlay .spin {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #7dd3fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p { font-size: 14px; color: rgba(255,255,255,0.5); }

    /* ── 헤더 ──────────────────────────────────────── */
    header {
      flex-shrink: 0;
      text-align: center;
      padding: 10px 16px 6px;
    }
    header h1 {
      font-size: clamp(13px, 2vw, 20px);
      letter-spacing: 3px;
      font-weight: bold;
      opacity: 0.75;
    }

    /* ── 이름 입력 바 ────────────────────────── */
    .name-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px 4px;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    #name-input {
      width: 100%;
      padding: 11px 16px;
      font-size: clamp(16px, 2.4vw, 22px);
      font-family: inherit;
      font-weight: bold;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 12px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 1px;
    }
    #name-input:focus       { border-color: rgba(255,255,255,0.6); }
    #name-input::placeholder { color: rgba(255,255,255,0.28); font-weight: normal; }
    #name-input.error       { border-color: #f87171; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    #name-input.shake { animation: shake 0.38s ease; }

    .name-hint {
      position: absolute;
      bottom: -18px;
      left: 4px;
      font-size: 11px;
      color: #fca5a5;
      white-space: nowrap;
      pointer-events: none;
    }

    .meta-col {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }
    .remaining {
      font-size: 13px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: #7dd3fc;
      white-space: nowrap;
    }

    /* ── 카드 그리드 ──────────────────────────────── */
    .grid-wrap {
      flex: 1;
      padding: 18px 14px 8px;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: var(--gap);
      width: 100%;
      max-width: 940px;
    }

    /* ── 카드 ──────────────────────────────────────── */
    .card {
      perspective: 700px;
      cursor: pointer;
      user-select: none;
      min-width: 0;
      min-height: 0;
    }
    .card.done { cursor: default; pointer-events: none; }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.72s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }

    .card-back, .card-front {
      position: absolute; inset: 0;
      border-radius: var(--radius);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .card-back {
      background: #1c2f5e;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
      transition: transform 0.16s, box-shadow 0.16s;
    }
    .card:not(.done):not(.flipped):active .card-back {
      transform: scale(0.94);
    }
    .card-back img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .card-back .name-bar-inner {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.76));
      padding: 12px 4px 4px;
      text-align: center;
      font-size: clamp(7px, 1vw, 11px);
      font-weight: bold; color: #fff;
    }

    .card-front {
      background: #fff;
      transform: rotateY(180deg);
      gap: 1px; padding: 4px;
    }
    .card-front .f-num {
      font-size: clamp(18px, 3.5vw, 36px);
      font-weight: bold; color: #0d1b36; line-height: 1;
    }
    .card-front .f-name {
      font-size: clamp(6px, 0.9vw, 10px);
      color: #666; max-width: 92%;
      overflow: hidden; white-space: nowrap;
      text-overflow: ellipsis; text-align: center;
    }

    .card.picking { animation: card-bounce 0.4s ease-in-out infinite; pointer-events: none; }
    .card.picking .card-back {
      box-shadow: 0 0 0 3px #ffd700, 0 0 20px 6px rgba(255,215,0,0.4), 0 6px 20px rgba(0,0,0,0.5);
    }
    @keyframes card-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-6px) scale(1.05); }
    }

    /* ── 하단 ──────────────────────────────────────── */
    .bottom-bar {
      flex-shrink: 0;
      padding: 4px 14px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }

    .picked-chips {
      flex: 1;
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .picked-chips::-webkit-scrollbar { height: 3px; }
    .picked-chips::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .chip {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px 3px 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chip .chip-num {
      background: #2f9e44; color: #fff;
      font-weight: bold; font-size: 10px;
      padding: 1px 5px; border-radius: 10px;
    }

    .btn-results {
      flex-shrink: 0;
      background: rgba(59,91,219,0.35);
      border: 1px solid rgba(100,130,255,0.4);
      color: rgba(180,200,255,0.9);
      padding: 5px 12px;
      border-radius: 8px;
      font-family: inherit; font-size: 11px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-results:hover { background: rgba(59,91,219,0.6); }

    .btn-reset {
      flex-shrink: 0;
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.3);
      padding: 5px 12px;
      border-radius: 8px;
      font-family: inherit; font-size: 11px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-reset:hover { color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.3); }

    /* ── 대공개 오버레이 ───────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200; align-items: center; justify-content: center;
    }
    .overlay.active { display: flex; }

    .reveal-box {
      background: #fff; border-radius: 28px;
      padding: clamp(22px, 4vw, 42px) clamp(30px, 6vw, 62px);
      text-align: center;
      animation: boxPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 24px 70px rgba(0,0,0,0.6);
      max-width: 90vw;
      display: flex; flex-direction: column; align-items: center;
    }
    @keyframes boxPop {
      from { transform: scale(0.4) rotate(-5deg); opacity: 0; }
      to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }

    .r-celeb-img {
      width: clamp(72px, 12vw, 120px);
      height: clamp(72px, 12vw, 120px);
      border-radius: 50%; object-fit: cover;
      border: 4px solid #e2e8f0; margin-bottom: 8px;
      animation: imgPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }
    @keyframes imgPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .r-label { font-size: 13px; color: #999; letter-spacing: 2px; font-weight: bold; }
    .r-num {
      font-size: clamp(72px, 14vw, 130px);
      font-weight: bold; color: #0d1b36; line-height: 1;
      animation: numZoom 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0.14s both;
    }
    @keyframes numZoom {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .r-name { font-size: clamp(16px, 3vw, 26px); font-weight: bold; color: #222; }
    .r-sub  { font-size: clamp(11px, 1.5vw, 13px); color: #aaa; margin-top: 2px; }

    .btn-confirm {
      margin-top: 20px; padding: 13px 38px;
      background: #1c3faa; color: #fff; border: none;
      border-radius: 14px;
      font-size: clamp(14px, 2vw, 17px);
      font-family: inherit; font-weight: bold;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn-confirm:hover  { background: #1438c8; }
    .btn-confirm:active { transform: scale(0.97); }

    .done-banner {
      display: none; position: fixed;
      top: 16px; left: 50%; transform: translateX(-50%);
      background: #2f9e44; color: #fff;
      padding: 10px 24px; border-radius: 30px;
      font-size: 14px; font-weight: bold;
      z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #confetti-canvas { position: fixed; inset: 0; z-index: 190; pointer-events: none; }

    /* ── 비밀번호 모달 ─────────────────────────────── */
    .pw-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 400; align-items: center; justify-content: center;
    }
    .pw-overlay.active { display: flex; }

    .pw-box {
      background: #1a2a50;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 28px 32px;
      width: 300px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      animation: boxPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .pw-title {
      font-size: 15px; font-weight: bold;
      color: rgba(255,255,255,0.85); letter-spacing: 1px;
    }
    .pw-input-wrap { position: relative; width: 100%; }
    #pw-input {
      width: 100%; padding: 11px 16px;
      font-size: 20px; letter-spacing: 6px; text-align: center;
      font-family: inherit; font-weight: bold;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 10px; color: #fff; outline: none;
      transition: border-color 0.2s;
    }
    #pw-input:focus { border-color: rgba(255,255,255,0.55); }
    #pw-input.pw-error { border-color: #f87171; }
    .pw-hint {
      font-size: 12px; color: #fca5a5;
      min-height: 16px; text-align: center;
    }
    .pw-btns {
      display: flex; gap: 10px; width: 100%;
    }
    .pw-btns button {
      flex: 1; padding: 10px;
      border-radius: 10px; border: none;
      font-family: inherit; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: background 0.2s;
    }
    .pw-btn-cancel {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }
    .pw-btn-cancel:hover { background: rgba(255,255,255,0.14); }
    .pw-btn-ok {
      background: #1c3faa; color: #fff;
    }
    .pw-btn-ok:hover { background: #1438c8; }
  </style>
</head>
<body>

<!-- 로딩 화면 -->
<div id="loading-overlay">
  <div class="spin"></div>
  <p>불러오는 중...</p>
</div>

<header>
  <h1>화법과 작문 — 연설 순서 뽑기</h1>
</header>

<div class="name-bar">
  <div class="input-wrap">
    <input type="text" id="name-input"
           placeholder="이름을 입력하고 카드를 선택하세요"
           maxlength="10" autocomplete="off"
           enterkeyhint="done"
           oninput="clearNameError()"
           onkeydown="if(event.key==='Enter') this.blur()">
    <div class="name-hint" id="name-hint"></div>
  </div>
  <div class="meta-col">
    <div class="remaining">남은 번호 <b id="remaining-count">30</b></div>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="bottom-bar">
  <div class="picked-chips" id="picked-chips"></div>
  <button class="btn-results" onclick="openResults()">결과 확인 →</button>
  <button class="btn-reset" onclick="resetAll()">처음부터 다시</button>
</div>

<div class="overlay" id="overlay">
  <div class="reveal-box">
    <img class="r-celeb-img" id="r-img" src="" alt="">
    <div class="r-label">연설 순서</div>
    <div class="r-num"  id="r-num"></div>
    <div class="r-name" id="r-name"></div>
    <div class="r-sub"  id="r-sub"></div>
    <button class="btn-confirm" onclick="closeReveal()">확인</button>
  </div>
</div>

<!-- 비밀번호 모달 -->
<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <div class="pw-title">🔒 비밀번호 입력</div>
    <div class="pw-input-wrap">
      <input type="password" id="pw-input" maxlength="10" placeholder="••••"
             oninput="document.getElementById('pw-hint').textContent=''; this.classList.remove('pw-error')"
             onkeydown="if(event.key==='Enter') confirmPw()">
    </div>
    <div class="pw-hint" id="pw-hint"></div>
    <div class="pw-btns">
      <button class="pw-btn-cancel" onclick="cancelPw()">취소</button>
      <button class="pw-btn-ok" onclick="confirmPw()">확인</button>
    </div>
  </div>
</div>

<div class="done-banner" id="done-banner">🎉 모두 순서를 뽑았습니다!</div>
<canvas id="confetti-canvas"></canvas>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// ── Firebase 설정 ────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAm6-zHyAZBdWBbuWn4V4yUCOSrnz3VeHk",
  authDomain: "speech-order-42b14.firebaseapp.com",
  databaseURL: "https://speech-order-42b14-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "speech-order-42b14",
  storageBucket: "speech-order-42b14.firebasestorage.app",
  messagingSenderId: "1095137752007",
  appId: "1:1095137752007:web:a3da3ff1e107508530dfe2"
};

firebase.initializeApp(firebaseConfig);
const db      = firebase.database();
const gameRef = db.ref('speech_order');

// ── 상수 & 전역 ──────────────────────────────────────────
const TOTAL = 30;

const ALL_CELEBS = [
  { src: 'images/건호.jpg',   name: '건호'   },
  { src: 'images/재민.jpg',   name: '재민'   },
  { src: 'images/도경수.jpg', name: '도경수' },
  { src: 'images/도훈.jpg',   name: '도훈'   },
  { src: 'images/리쿠.jpg',   name: '리쿠'   },
  { src: 'images/명재현.jpg', name: '명재현' },
  { src: 'images/뷔.jpg',     name: '뷔'     },
  { src: 'images/사쿠야.jpg', name: '사쿠야' },
  { src: 'images/상원.jpg',   name: '상원'   },
  { src: 'images/상현.jpg',   name: '상현'   },
  { src: 'images/성찬.jpg',   name: '성찬'   },
  { src: 'images/성한빈.jpg', name: '성한빈' },
  { src: 'images/성현.jpg',   name: '성현'   },
  { src: 'images/성훈.jpg',   name: '성훈'   },
  { src: 'images/수빈.jpg',   name: '수빈'   },
  { src: 'images/시온.jpg',   name: '시온'   },
  { src: 'images/신유.jpg',   name: '신유'   },
  { src: 'images/앤톤.jpg',   name: '앤톤'   },
  { src: 'images/연준.jpg',   name: '연준'   },
  { src: 'images/변우석.jpg', name: '변우석' },
  { src: 'images/원빈.jpg',   name: '원빈'   },
  { src: 'images/원필.jpg',   name: '원필'   },
  { src: 'images/유우시.jpg', name: '유우시' },
  { src: 'images/정국.jpg',   name: '정국'   },
  { src: 'images/지디.jpg',   name: '지디'   },
  { src: 'images/카이.jpg',   name: '카이'   },
  { src: 'images/태산.jpg',   name: '태산'   },
  { src: 'images/필릭스.jpg', name: '필릭스' },
  { src: 'images/한유진.jpg', name: '한유진' },
  { src: 'images/박보검.jpg', name: '박보검' },
];

let isAnim    = false;
let pickCount = 0;
let audioCtx  = null;

// ── 유틸 ────────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function checkName() {
  const val = document.getElementById('name-input').value.trim();
  if (val) return val;
  const inp = document.getElementById('name-input');
  inp.classList.remove('shake');
  inp.classList.add('error');
  void inp.offsetWidth;
  inp.classList.add('shake');
  document.getElementById('name-hint').textContent = '이름을 먼저 입력해주세요.';
  inp.focus();
  return null;
}

function clearNameError() {
  document.getElementById('name-input').classList.remove('error');
  document.getElementById('name-hint').textContent = '';
}

// ── Firebase 초기화 ──────────────────────────────────────
// 처음 접속한 학생(또는 선생님)이 카드 배치를 생성.
// 동시 접속 시 transaction으로 한 명만 초기화 담당.
async function ensureInitialized() {
  return new Promise((resolve, reject) => {
    gameRef.child('initialized').transaction(
      current => (!current ? true : undefined),
      (error, committed) => {
        if (error) { reject(error); return; }
        if (committed) {
          const nums   = shuffle(Array.from({ length: TOTAL }, (_, i) => i + 1));
          const celebs = shuffle([...ALL_CELEBS]);
          const cards  = {};
          for (let i = 0; i < TOTAL; i++) {
            cards[String(i)] = {
              number:    nums[i],
              celebSrc:  celebs[i].src,
              celebName: celebs[i].name,
              taken:     false,
              name:      null
            };
          }
          gameRef.child('cards').set(cards).then(resolve).catch(reject);
        } else {
          resolve();
        }
      }
    );
  });
}

// ── 그리드 생성 ──────────────────────────────────────────
function buildGrid(cardsData) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let taken = 0;

  for (let i = 0; i < TOTAL; i++) {
    const card   = cardsData[String(i)];
    if (card.taken) taken++;

    const cardEl = document.createElement('div');
    cardEl.className   = 'card' + (card.taken ? ' flipped done' : '');
    cardEl.dataset.idx = String(i);
    cardEl.innerHTML   = `
      <div class="card-inner">
        <div class="card-front">
          <div class="f-num"  id="fn-${i}">${card.taken ? card.number : ''}</div>
          <div class="f-name" id="fna-${i}">${card.taken && card.name ? card.name : ''}</div>
        </div>
        <div class="card-back">
          <img src="${card.celebSrc}" alt="${card.celebName}" loading="lazy">
          <div class="name-bar-inner">${card.celebName}</div>
        </div>
      </div>`;
    grid.appendChild(cardEl);
  }

  document.getElementById('remaining-count').textContent = TOTAL - taken;
  pickCount = taken;
  renderChipsFromData(cardsData);
}

// ── 실시간 리스너 ────────────────────────────────────────
function listenCards() {
  // 다른 학생이 카드를 선택하면 즉시 뒤집기
  gameRef.child('cards').on('child_changed', snapshot => {
    const idx  = Number(snapshot.key);
    const card = snapshot.val();
    if (!card.taken) return;

    const cardEl = document.querySelector(`[data-idx="${idx}"]`);
    if (cardEl && !cardEl.classList.contains('flipped')) {
      cardEl.classList.add('flipped', 'done');
      document.getElementById(`fn-${idx}`).textContent  = card.number;
      document.getElementById(`fna-${idx}`).textContent = card.name || '';
    }
  });

  // 남은 번호 & 칩 업데이트
  gameRef.child('cards').on('value', snapshot => {
    const cards = snapshot.val();
    if (!cards) return;
    const taken = Object.values(cards).filter(c => c.taken).length;
    document.getElementById('remaining-count').textContent = TOTAL - taken;
    pickCount = taken;
    renderChipsFromData(cards);
  });
}

// ── 칩 렌더 ─────────────────────────────────────────────
function renderChipsFromData(cards) {
  const log = Object.values(cards)
    .filter(c => c.taken && c.name)
    .sort((a, b) => a.number - b.number);
  document.getElementById('picked-chips').innerHTML = log.map(p =>
    `<div class="chip"><span class="chip-num">${p.number}</span>${p.name}</div>`
  ).join('');
}

// ── 카드 선택 ────────────────────────────────────────────
async function onPick(idx, cardEl) {
  if (isAnim) return;
  if (cardEl.classList.contains('done') || cardEl.classList.contains('picking')) return;

  const name = checkName();
  if (!name) return;

  isAnim = true;
  cardEl.classList.add('picking');

  playDrumRoll(2400, async () => {
    cardEl.classList.remove('picking');

    let cardData = null;
    try {
      const result = await gameRef.child(`cards/${idx}`).transaction(current => {
        if (!current || current.taken) return undefined; // 이미 선택됨 → abort
        return { ...current, taken: true, name };
      });

      if (!result.committed) {
        isAnim = false;
        alert('이미 다른 학생이 선택한 카드입니다!\n다른 카드를 선택해주세요.');
        return;
      }
      cardData = result.snapshot.val();
    } catch (e) {
      console.error(e);
      isAnim = false;
      alert('오류가 발생했습니다. 다시 시도해주세요.');
      return;
    }

    cardEl.classList.add('flipped', 'done');
    document.getElementById(`fn-${idx}`).textContent  = cardData.number;
    document.getElementById(`fna-${idx}`).textContent = name;

    setTimeout(() => {
      showReveal(cardData.number, name, { src: cardData.celebSrc, name: cardData.celebName });
      playFanfare();
      launchConfetti();
      isAnim = false;
    }, 420);
  });
}

// ── 오버레이 ─────────────────────────────────────────────
function showReveal(num, name, celeb) {
  document.getElementById('r-img').src  = celeb.src;
  document.getElementById('r-num').textContent  = num;
  document.getElementById('r-name').textContent = name;
  document.getElementById('r-sub').textContent  = `${num}번째 연설자로 선정되었습니다!`;
  document.getElementById('overlay').classList.add('active');
}

function closeReveal() {
  document.getElementById('overlay').classList.remove('active');
  stopConfetti();

  if (pickCount >= TOTAL) {
    const b = document.getElementById('done-banner');
    b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', 4000);
  }

  const inp = document.getElementById('name-input');
  inp.value = '';
  clearNameError();
  inp.focus();
}

// ── 비밀번호 모달 ────────────────────────────────────────
const PW = '2580';
let pwCallback = null;

function askPassword(callback) {
  pwCallback = callback;
  const inp = document.getElementById('pw-input');
  inp.value = '';
  inp.classList.remove('pw-error');
  document.getElementById('pw-hint').textContent = '';
  document.getElementById('pw-overlay').classList.add('active');
  setTimeout(() => inp.focus(), 50);
}

function confirmPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PW) {
    document.getElementById('pw-overlay').classList.remove('active');
    if (pwCallback) { const cb = pwCallback; pwCallback = null; cb(); }
  } else {
    const inp = document.getElementById('pw-input');
    inp.classList.add('pw-error');
    inp.value = '';
    inp.focus();
    document.getElementById('pw-hint').textContent = '비밀번호가 틀렸습니다.';
  }
}

function cancelPw() {
  document.getElementById('pw-overlay').classList.remove('active');
  pwCallback = null;
}

function openResults() {
  askPassword(() => window.open('results.html', '_blank'));
}

// ── 전체 초기화 ──────────────────────────────────────────
async function resetAll() {
  askPassword(async () => {
  if (!confirm('모든 번호를 초기화하고 처음부터 다시 시작할까요?')) return;

  // 리스너 제거
  gameRef.child('cards').off();

  isAnim = false;
  stopConfetti();
  document.getElementById('done-banner').style.display = 'none';
  const inp = document.getElementById('name-input');
  inp.value = '';
  clearNameError();

  await gameRef.set(null);
  await ensureInitialized();
  const snapshot = await gameRef.child('cards').once('value');
  buildGrid(snapshot.val());
  listenCards();
  }); // askPassword 콜백 끝
}

// ── 드럼롤 ───────────────────────────────────────────────
function playDrumRoll(durationMs, callback) {
  const ctx   = getAudioCtx();
  const endAt = ctx.currentTime + durationMs / 1000;
  let t = ctx.currentTime + 0.05, interval = 0.30;
  while (t < endAt) {
    snareHit(ctx, t, 0.12 + ((t - ctx.currentTime) / (durationMs / 1000)) * 0.32);
    interval = Math.max(0.038, interval * 0.905);
    t += interval;
  }
  kickHit(ctx, endAt - 0.04);
  setTimeout(callback, durationMs);
}

function snareHit(ctx, time, vol) {
  const size = Math.floor(ctx.sampleRate * 0.09);
  const buf  = ctx.createBuffer(1, size, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const hp  = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1600;
  const g   = ctx.createGain();
  g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.075);
  src.connect(hp); hp.connect(g); g.connect(ctx.destination);
  src.start(time); src.stop(time + 0.1);
}

function kickHit(ctx, time) {
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.18);
  g.gain.setValueAtTime(1.2, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.28);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(time); osc.stop(time + 0.32);
}

// ── 팡파르 ───────────────────────────────────────────────
function playFanfare() {
  const ctx = getAudioCtx(), now = ctx.currentTime;
  [{f:261.63,t:0.00,d:0.22},{f:329.63,t:0.18,d:0.22},{f:392.00,t:0.34,d:0.22},{f:523.25,t:0.50,d:0.65}]
    .forEach(({f,t,d}) => tone(ctx,f,now+t,d,0.38,'sawtooth'));
  [523.25,659.25,783.99].forEach(f => tone(ctx,f,now+0.58,1.0,0.22,'sawtooth'));
  [1046.5,1318.5,1567.98].forEach((f,i) => tone(ctx,f,now+0.60+i*0.07,0.45,0.07,'sine'));
}

function tone(ctx, freq, start, dur, vol, type) {
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(vol, start + 0.03);
  g.gain.setValueAtTime(vol, start + dur * 0.72);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(start); osc.stop(start + dur + 0.05);
}

// ── 색종이 ───────────────────────────────────────────────
const cvs  = document.getElementById('confetti-canvas');
const cctx = cvs.getContext('2d');
let parts = [], rafId = null;
const CC  = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#CC5DE8','#FFA94D','#69DB7C'];

function launchConfetti() {
  cvs.width = window.innerWidth; cvs.height = window.innerHeight;
  parts = Array.from({length: 200}, () => ({
    x: Math.random() * cvs.width,
    y: Math.random() * cvs.height * 0.3 - cvs.height * 0.1,
    w: Math.random() * 11 + 5, h: Math.random() * 5 + 3,
    color: CC[Math.floor(Math.random() * CC.length)],
    vx: (Math.random()-0.5)*5, vy: Math.random()*4+1.5,
    angle: Math.random()*Math.PI*2, spin: (Math.random()-0.5)*0.18, life: 1,
  }));
  if (rafId) cancelAnimationFrame(rafId);
  animConf();
}

function animConf() {
  cctx.clearRect(0, 0, cvs.width, cvs.height);
  parts.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.09; p.angle+=p.spin;
    if (p.y > cvs.height*0.55) p.life -= 0.022;
    cctx.save();
    cctx.globalAlpha = Math.max(0, p.life);
    cctx.translate(p.x, p.y); cctx.rotate(p.angle);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    cctx.restore();
  });
  parts = parts.filter(p => p.life > 0);
  if (parts.length) rafId = requestAnimationFrame(animConf);
  else cctx.clearRect(0, 0, cvs.width, cvs.height);
}

function stopConfetti() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  cctx.clearRect(0, 0, cvs.width, cvs.height);
  parts = [];
}

// ── 이벤트 위임 (카드 클릭) ──────────────────────────────
document.getElementById('grid').addEventListener('click', e => {
  const cardEl = e.target.closest('.card');
  if (!cardEl) return;
  onPick(Number(cardEl.dataset.idx), cardEl);
});

// ── 시작 ─────────────────────────────────────────────────
async function start() {
  const loadingEl = document.getElementById('loading-overlay');
  try {
    await ensureInitialized();
    const snapshot = await gameRef.child('cards').once('value');
    buildGrid(snapshot.val());
    listenCards();
    document.getElementById('name-input').focus();
  } catch (e) {
    console.error('Firebase 연결 실패:', e);
    loadingEl.innerHTML = '<p style="color:#fca5a5;text-align:center;padding:24px">Firebase 연결에 실패했습니다.<br>잠시 후 새로고침 해주세요.</p>';
    return;
  }
  loadingEl.style.display = 'none';
}

start();
