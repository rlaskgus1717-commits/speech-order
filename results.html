<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연설 순서 결과</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #f1f3f9;
      min-height: 100vh;
      color: #111;
    }

    /* ── 헤더 ───────────────────────────── */
    header {
      background: #1c3faa;
      color: #fff;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: clamp(15px, 2.5vw, 20px);
      letter-spacing: 1px;
      font-weight: bold;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
    }
    #status-text { opacity: 0.85; }

    /* ── 도구 바 ────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 28px;
      background: #fff;
      border-bottom: 1px solid #dee2e6;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #2f9e44;
      font-weight: bold;
    }
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2f9e44;
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .spacer { flex: 1; }

    .btn {
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-outline {
      background: none;
      border: 1px solid #ced4da;
      color: #495057;
    }
    .btn-outline:hover { background: #f1f3f5; }
    .btn-primary {
      background: #1c3faa;
      color: #fff;
      border: none;
    }
    .btn-primary:hover { background: #1438c8; }

    /* ── 진행 바 ────────────────────────── */
    .progress-wrap {
      padding: 12px 28px 0;
    }
    .progress-bar-bg {
      background: #dee2e6;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1c3faa, #4dabf7);
      border-radius: 6px;
      transition: width 0.6s ease;
    }
    .progress-label {
      font-size: 12px;
      color: #868e96;
      margin-top: 5px;
      margin-bottom: 16px;
    }

    /* ── 결과 목록 ──────────────────────── */
    .list-wrap {
      padding: 0 28px 32px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .order-item {
      background: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1.5px solid #e9ecef;
      transition: border-color 0.2s;
    }
    .order-item.filled {
      border-color: #bac8ff;
      background: #f8f9ff;
    }

    .order-num {
      font-size: 22px;
      font-weight: bold;
      color: #dee2e6;
      min-width: 36px;
      text-align: center;
      line-height: 1;
    }
    .order-item.filled .order-num { color: #1c3faa; }

    .order-info { flex: 1; min-width: 0; }

    .student-name {
      font-size: clamp(14px, 2vw, 17px);
      font-weight: bold;
      color: #212529;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .order-item.empty .student-name {
      color: #ced4da;
      font-weight: normal;
      font-size: 13px;
    }

    .celeb-tag {
      font-size: 11px;
      color: #868e96;
      margin-top: 2px;
    }

    /* ── 빈 상태 ────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 20px;
      color: #adb5bd;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── 인쇄 스타일 ────────────────────── */
    @media print {
      body { background: #fff; }
      .toolbar, .no-print { display: none !important; }
      header { background: #1c3faa !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .order-item.filled { border-color: #bac8ff !important; background: #f8f9ff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .list-wrap { padding: 16px; }
      .progress-wrap { padding: 12px 16px 0; }
    }

    @media (max-width: 600px) {
      .list-wrap { grid-template-columns: 1fr; }
      header { padding: 14px 16px; }
      .toolbar { padding: 10px 16px; }
      .list-wrap { padding: 0 12px 24px; }
      .progress-wrap { padding: 12px 16px 0; }
    }
  </style>
</head>
<body>

<header>
  <h1>화법과 작문 — 연설 순서 결과</h1>
  <div class="header-right">
    <span id="status-text">불러오는 중...</span>
  </div>
</header>

<div class="toolbar no-print">
  <div class="live-badge">
    <div class="live-dot"></div>
    실시간 업데이트
  </div>
  <div class="spacer"></div>
  <a href="index.html" class="btn btn-outline">← 뽑기 화면</a>
  <button class="btn btn-primary" onclick="window.print()">🖨 인쇄</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progress-label">0 / 30명 완료</div>
</div>

<div class="list-wrap" id="list-wrap"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const TOTAL = 30;

const firebaseConfig = {
  apiKey: "AIzaSyAm6-zHyAZBdWBbuWn4V4yUCOSrnz3VeHk",
  authDomain: "speech-order-42b14.firebaseapp.com",
  databaseURL: "https://speech-order-42b14-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "speech-order-42b14",
  storageBucket: "speech-order-42b14.firebasestorage.app",
  messagingSenderId: "1095137752007",
  appId: "1:1095137752007:web:a3da3ff1e107508530dfe2"
};

firebase.initializeApp(firebaseConfig);
const db      = firebase.database();
const gameRef = db.ref('speech_order');

function render(cards) {
  const wrap = document.getElementById('list-wrap');

  if (!cards) {
    document.getElementById('status-text').textContent   = '아직 아무도 뽑지 않았어요';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-label').textContent = `0 / ${TOTAL}명 완료`;
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>뽑기를 시작하면 여기에 순서가 표시됩니다.</p>
      </div>`;
    return;
  }

  // number → {name, celebName} 맵
  const map = {};
  Object.values(cards).forEach(c => {
    if (c.taken) map[c.number] = { name: c.name, celeb: c.celebName || '' };
  });

  const filled = Object.keys(map).length;
  const pct    = Math.round((filled / TOTAL) * 100);

  document.getElementById('status-text').textContent =
    filled === 0     ? '아직 아무도 뽑지 않았어요' :
    filled === TOTAL ? '🎉 모두 완료!' :
    `${filled}명 완료 · ${TOTAL - filled}명 남음`;

  document.getElementById('progress-fill').style.width   = pct + '%';
  document.getElementById('progress-label').textContent  = `${filled} / ${TOTAL}명 완료`;

  wrap.innerHTML = Array.from({ length: TOTAL }, (_, i) => {
    const num  = i + 1;
    const info = map[num];
    if (info) {
      return `
        <div class="order-item filled">
          <div class="order-num">${num}</div>
          <div class="order-info">
            <div class="student-name">${info.name}</div>
            ${info.celeb ? `<div class="celeb-tag">${info.celeb}</div>` : ''}
          </div>
        </div>`;
    } else {
      return `
        <div class="order-item empty">
          <div class="order-num">${num}</div>
          <div class="order-info">
            <div class="student-name">미정</div>
          </div>
        </div>`;
    }
  }).join('');
}

// Firebase 실시간 리스너 (3초 폴링 → 즉시 반영)
gameRef.child('cards').on('value', snapshot => {
  render(snapshot.val());
});
</script>
</body>
</html>
